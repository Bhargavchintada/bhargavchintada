version: '3.8'

services:
  cybersecurity-portfolio:
    build: .
    container_name: chintada-bhargav-portfolio
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cyberportfolio.rule=Host(`localhost`)"
      - "traefik.http.services.cyberportfolio.loadbalancer.server.port=80"
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
