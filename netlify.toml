[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "18"

# Custom domain configuration
[[redirects]]
  from = "https://bhargavchintada.me/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "https://www.bhargavchintada.me/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
